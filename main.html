<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>
<link rel="stylesheet" href="main.css">
</head>

<body>

<!-- 🎂 CAKE SCREEN -->
<section id="cake-screen" class="screen active">
<h1 id="wish-title">Make a Wish 🎂</h1><div class="cake">
    <div class="layer bottom-layer">
        <span>ABHI 🎉</span>
    </div>

    <div class="layer middle-layer">
        <span> HAPPY BIRTHDAY</span>
    </div>

    <div class="layer top-layer">
        <span></span>
    </div>

    <div class="icing"></div>

    <!-- 🎂 MULTIPLE CANDLES -->
    <div class="candles">
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
    </div>
</div>

<button onclick="blowCandles()">🎂 Blow Candles</button></section>

<!-- ❓ QUESTION -->
<section id="question-screen" class="screen">
    <div class="question-box">
        <h1>Ready for your surprise? 😏</h1>

        <div class="btn-group">
            <button onclick="answerYes()">YES 💖</button>
            <button onclick="answerNo()">NO 🙄</button>
        </div>

        <p id="noMsg"></p>
    </div>
</section>
<section id="no-screen" class="screen">
    <div class="question-box no-box">
        <h1 class="no-text">FAAAAAAAAAAAAAAA</h1>

        <button onclick="showScreen('cake-screen')">Go Back 🎂</button>
    </div>
</section>

<section id="boxes-screen" class="screen">
<h1>Choose Your Surprise 🎁</h1>
    <div class="boxes">  <!-- ✅ THIS WRAPPER MUST EXIST -->

        <div class="gift-box" onclick="openBox(this,1)">
            <div class="gift-lid"></div>
            <div class="gift-body">📸 <span>Memories</span></div>
        </div>

        <div class="gift-box" onclick="openBox(this,2)">
            <div class="gift-lid"></div>
            <div class="gift-body">💌 <span>Wishes</span></div>
        </div>

        <div class="gift-box" onclick="openBox(this,3)">
            <div class="gift-lid"></div>
            <div class="gift-body">🙏 <span>Prayer</span></div>
        </div>

    </div>
</section>

<!-- 📄 VIEW PAGE -->
<section id="view-screen" class="screen">
<button class="back-btn" onclick="goBack()">⬅ Back</button>
    <div id="view-content"></div>
</section>

<script src="main.js"></script>
</body>
</html>
